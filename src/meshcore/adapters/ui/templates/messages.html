<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages - MeshCore HQ</title>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-brand">
            <h1>MeshCore HQ</h1>
        </div>
        <div class="nav-links">
            <a href="/" class="nav-link">Dashboard</a>
            <a href="/messages" class="nav-link active">Messages</a>
            <a href="/compose" class="nav-link">Compose</a>
            <a href="/analytics" class="nav-link">Analytics</a>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <h2>Message History</h2>
            <a href="/compose" class="btn btn-primary">New Message</a>
        </div>

        {% if node_id %}
        <div class="filter-active" style="background: #2a3f5f; padding: 12px; margin-bottom: 20px; border-radius: 4px; border-left: 4px solid #f4c430;">
            <span>📍 Filtering by node: <strong>{{ node_id }}</strong></span>
            <a href="/messages" style="color: #f4c430; margin-left: 15px; text-decoration: underline;">Clear filter</a>
        </div>
        {% endif %}

        <!-- Search and Filter -->
        <div class="filter-bar">
            <form hx-get="/messages/list" 
                  hx-target="#messages-list" 
                  hx-trigger="submit, input delay:500ms from:#search">
                {% if node_id %}
                <input type="hidden" name="node_id" value="{{ node_id }}">
                {% endif %}
                <input type="text" 
                       id="search" 
                       name="search" 
                       placeholder="Search messages..."
                       class="search-input">
                <button type="submit" class="btn btn-secondary">Search</button>
            </form>
        </div>

        <!-- Tab bar -->
        <div class="tab-bar">
            <button class="tab-btn tab-btn-active"
                    onclick="switchTab(this, 'tab-received')"
                    id="btn-received">Received</button>
            <button class="tab-btn"
                    onclick="switchTab(this, 'tab-sent')"
                    id="btn-sent">Sent</button>
        </div>

        <!-- Received Messages -->
        <div id="tab-received" class="tab-panel messages-container">
            <div id="messages-list"
                 hx-get="/messages/list{% if node_id %}?node_id={{ node_id }}{% endif %}"
                 hx-trigger="load, every 5s"
                 hx-swap="innerHTML">
                <p class="loading">Loading messages...</p>
            </div>
        </div>

        <!-- Sent Messages -->
        <div id="tab-sent" class="tab-panel messages-container" style="display:none">
            <div id="sent-messages-list"
                 hx-get="/messages/sent"
                 hx-trigger="load, every 5s"
                 hx-swap="innerHTML">
                <p class="loading">Loading sent messages...</p>
            </div>
        </div>
    </div>

    <script>
        function switchTab(btn, panelId) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('tab-btn-active'));
            document.querySelectorAll('.tab-panel').forEach(p => p.style.display = 'none');
            btn.classList.add('tab-btn-active');
            document.getElementById(panelId).style.display = '';
            // Immediately refresh whichever HTMX element is in this tab.
            const htmxEl = document.querySelector('#' + panelId + ' [hx-get]');
            if (htmxEl) htmx.trigger(htmxEl, 'load');
        }
    </script>
</body>
</html>
